<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday Reem</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="sparkles" aria-hidden="true"></div>

  <main class="app">
    <section class="hero">
      <h1>Happy Birthday, Reem</h1>
      <p class="intro">Every photo here is a small reason why this day is special to me.</p>
    </section>

    <section class="card" aria-live="polite">
      <div class="photo-wrap">
        <img id="photo" src="assets/reem-looking-away.jpeg" alt="A birthday photo of Reem" />
        <div class="badge" id="counter">1 / 4</div>
      </div>

      <div class="message-box">
        <h2 id="title">The Eyes</h2>
        <p id="message">These are the eyes I fell in love with from first sight.</p>
      </div>

      <div class="controls">
        <button id="prevBtn" type="button">Back</button>
        <button id="nextBtn" type="button">Next</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
